output: results/csv/run_grid.csv
seeds: [11, 29]
dimensions: [32, 64]
dataset_sizes: [1200]
num_queries: 40
k: 10

index_config:
  partition_exact_threshold: 80
  planner_exact_threshold: 250

regimes:
  - name: static
    synthetic:
      n: 1200
      d: 32
      num_clusters: 8

  - name: short_lifetime_expire
    synthetic:
      n: 1200
      d: 32
      num_clusters: 8
      lifetime_min: 1
      lifetime_max: 8
    operations:
      expire_before: 120

  - name: long_lifetime_expire
    synthetic:
      n: 1200
      d: 32
      num_clusters: 8
      lifetime_min: 120
      lifetime_max: 300
    operations:
      expire_before: 120

  - name: open_ended_heavy
    synthetic:
      n: 1200
      d: 32
      num_clusters: 8
      lifetime_min: 20
      lifetime_max: 80
      open_ended_fraction: 0.7
    operations:
      expire_before: 120

  - name: append_delete
    synthetic:
      n: 900
      d: 32
      num_clusters: 8
    operations:
      append_count: 300
      delete_fraction: 0.1
